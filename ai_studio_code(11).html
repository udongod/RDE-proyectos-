<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkiMotion F1 Pro Dashboard</title>
    <!-- Librerías de MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <!-- Librería Paho MQTT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    
    <style>
        :root { --green-color: #00ff00; --red-color: #ff003c; }
        body { margin: 0; padding: 0; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; overflow: hidden; }
        .video-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); pointer-events: auto; }
        .stats { display: flex; align-items: center; gap: 20px; }
        .counter-box { font-size: 1.5rem; font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 10px; border: 1px solid #333; }
        #count { color: var(--green-color); font-size: 2.5rem; margin-left: 10px;}
        .badges { display: flex; flex-direction: column; gap: 5px; }
        .badge { padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; text-transform: uppercase;}
        #mqtt-status { background-color: #d32f2f; }
        #status-indicator { background-color: #ff9800; }
        .top-controls { display: flex; gap: 10px; }
        button { pointer-events: auto; background-color: rgba(2, 136, 209, 0.8); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: bold; backdrop-filter: blur(5px); transition: all 0.3s; }
        button:hover { background-color: #0288d1; transform: scale(1.05); }
        button.btn-icon { font-size: 1.2rem; padding: 10px; }
        .speedo-container { position: absolute; bottom: 30px; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.7); border-radius: 50%; padding: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.8); border: 2px solid #333; backdrop-filter: blur(5px); }
        .speedo-left { left: 30px; border-color: rgba(0, 255, 0, 0.3); }
        .speedo-right { right: 30px; border-color: rgba(255, 0, 60, 0.3); }
        .speedo-svg { transform: rotate(-90deg); width: 140px; height: 140px; }
        .speedo-svg circle { fill: none; stroke-width: 10; stroke-linecap: round; }
        .speedo-bar { stroke-dasharray: 377; stroke-dashoffset: 377; transition: stroke-dashoffset 0.2s ease-out, stroke 0.3s; }
        #bar-green { stroke: var(--green-color); filter: drop-shadow(0 0 5px var(--green-color)); }
        #bar-red { stroke: var(--red-color); filter: drop-shadow(0 0 5px var(--red-color)); }
        .speed-text-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;}
        .speed-val { font-size: 2.2rem; font-weight: 900; font-family: 'Courier New', Courier, monospace; letter-spacing: -2px;}
        .speed-unit { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: none; justify-content: center; align-items: center; pointer-events: auto; }
        .modal-content { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); border: 1px solid #444; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #888; }
        .modal-close:hover { color: white; }
        .config-item { display: flex; flex-direction: column; margin-bottom: 15px; }
        .config-item label { color: #aaa; font-size: 0.85rem; margin-bottom: 5px; }
        .config-item input, .config-item select { background: #2c2c2c; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; font-size: 1rem; }
        .f1-btn { background-color: #f57c00; width: 100%; margin-top: 15px; padding: 15px; font-size: 1.1rem; }
        .f1-btn:hover { background-color: #e65100; }
        #snow-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: hidden;}
        .snow-particle { position: absolute; width: 8px; height: 8px; background: white; border-radius: 50%; box-shadow: 0 0 10px white; opacity: 0; animation: blow 1s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes blow { 0% { transform: translate(0, 0) scale(0.5); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>
    <div class="video-container"><video id="video_element" autoplay playsinline muted></video><canvas id="canvas_element"></canvas></div>
    <div id="snow-layer"></div>
    <div class="hud">
        <div class="top-bar">
            <div class="stats">
                <div class="counter-box">AVANCES <span id="count">0</span></div>
                <div class="badges">
                    <span id="mqtt-status" class="badge">🔌 MQTT Desconectado</span>
                    <span id="status-indicator" class="badge">📷 Iniciando Cámara...</span>
                </div>
            </div>
            <div class="top-controls">
                <button onclick="resetCounter()">🔄 Reset</button>
                <button class="btn-icon" onclick="toggleSettings()">⚙️</button>
            </div>
        </div>
        <div class="speedo-container speedo-left"><svg class="speedo-svg" viewBox="0 0 140 140"><circle class="speedo-bg" cx="70" cy="70" r="60"></circle><circle id="bar-green" class="speedo-bar" cx="70" cy="70" r="60"></circle></svg><div class="speed-text-container"><div id="val-green" class="speed-val">0.0</div><div class="speed-unit">KM/H</div></div></div>
        <div class="speedo-container speedo-right"><svg class="speedo-svg" viewBox="0 0 140 140"><circle class="speedo-bg" cx="70" cy="70" r="60"></circle><circle id="bar-red" class="speedo-bar" cx="70" cy="70" r="60"></circle></svg><div class="speed-text-container"><div id="val-red" class="speed-val">0.0</div><div class="speed-unit">KM/H</div></div></div>
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="toggleSettings()">✖</span>
            <h2>⚙️ Ajustes de Pista</h2>
            <div class="config-item"><label>Broker MQTT (IP):</label><input type="text" id="mqtt-host" value="192.168.1.1"></div>
            <div class="config-item" style="display:flex; flex-direction:row; gap:10px;"><div style="flex:1;"><label>Prefijo:</label><input type="text" id="mqtt-prefix" value="track01"></div><div style="width:80px;"><label>Puerto:</label><input type="number" id="mqtt-port" value="9001"></div></div>
            <div class="config-item"><label>Piloto:</label><select id="player-select"><option value="greencar">🟢 Verde (P1)</option><option value="redcar">🔴 Rojo (P2)</option></select></div>
            <button style="width:100%; background:#388e3c;" onclick="connectMQTT()">🔌 Conectar</button>
            <button class="f1-btn" onclick="sendF1Start()">🚦 FORZAR SALIDA F1</button>
        </div>
    </div>

    <script>
        function toggleSettings() { const m = document.getElementById('settings-modal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function resetCounter() { repeticiones = 0; document.getElementById('count').innerText = repeticiones; }
        
        function triggerAdvance() {
            repeticiones++; document.getElementById('count').innerText = repeticiones;
            const prefix = document.getElementById('mqtt-prefix').value;
            const player = document.getElementById('player-select').value;
            if (mqttClient && isMqttConnected) {
                const msg = new Paho.MQTT.Message("1");
                msg.destinationName = `${prefix}/${player}`;
                mqttClient.send(msg);
            }
        }

        function analizarMovimiento(l) {
            const L_SH = 11, R_SH = 12, L_WR = 15, R_WR = 16, L_HIP = 23, R_HIP = 24, L_EL = 13, R_EL = 14;
            // 1. RECORRIDO REDUCIDO: Mitad torso (Hombro-Cadera media) a Cadera
            const torsoY = ((l[L_SH].y + l[L_HIP].y) / 2 + (l[R_SH].y + l[R_HIP].y) / 2) / 2;
            const caderaY = (l[L_HIP].y + l[R_HIP].y) / 2;
            
            const manosArriba = l[L_WR].y < (torsoY + 0.05);
            const manosAbajo = l[L_WR].y > (caderaY - 0.05);

            if (manosArriba) estadoEsqui = 'ARRIBA';
            else if (manosAbajo && estadoEsqui === 'ARRIBA') { estadoEsqui = 'ABAJO'; triggerAdvance(); }

            // 2. TRUCO GALLINA REDUCIDO: Aleteo pequeño cerca del hombro
            const codosCercaHombro = Math.abs(l[L_EL].y - l[L_SH].y) < 0.15; // Límite 15cm (aprox 0.15)
            if (codosCercaHombro && estadoGallina === 'ABAJO') { estadoGallina = 'ARRIBA'; triggerAdvance(); }
            else if (!codosCercaHombro) estadoGallina = 'ABAJO';
        }

        // MQTT Y DEMÁS... (Mantiene lógica anterior)
        let mqttClient, isMqttConnected = false, repeticiones = 0, estadoEsqui = 'ABAJO', estadoGallina = 'ABAJO';
        
        function connectMQTT() {
            const host = document.getElementById('mqtt-host').value;
            const port = parseInt(document.getElementById('mqtt-port').value);
            mqttClient = new Paho.MQTT.Client(host, port, "SkiWeb_" + Math.random().toString(16).substr(2, 8));
            mqttClient.connect({ onSuccess: () => { isMqttConnected = true; toggleSettings(); }, path: "/mqtt", useSSL: false });
        }

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
        pose.onResults((results) => { if(results.poseLandmarks) analizarMovimiento(results.poseLandmarks); });

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({video: true});
            document.getElementById('video_element').srcObject = stream;
            function loop() { pose.send({image: document.getElementById('video_element')}).then(() => requestAnimationFrame(loop)); }
            loop();
        }
        startCamera();
        document.getElementById('settings-modal').style.display = 'flex';
    </script>
</body>
</html>
